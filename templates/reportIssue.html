<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Report an Issue — Street Issue Tracker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <link rel="stylesheet" href="/static/sidebar.css"/>
    <link rel="stylesheet" href="/static/reports.css"/>
</head>

<body>
    <nav id="sidebar" data-page="report"  data-username="{{session['username'] }}" data-role = "{{ session['role']}}"></nav>
    <main id="main">

        <div class="page-header">
            <h2 class="page-title">Report an Issue</h2>
        </div>

        <div class="card">
            <div class="form-grid">

                <div class="form-group">
                    <label>Location / Area</label>
                    <input type="text" id="repLocation" placeholder="e.g. Main Street, Block 5" />
                </div>

                <div class="form-group">
                    <label>Issue Category</label>
                    <select id="repCategory">
                        <option value="">Select a category</option>
                        <option>Pothole</option>
                        <option>Broken Streetlight</option>
                        <option>Garbage Overflow</option>
                        <option>Water Leakage</option>
                        <option>Damaged Pavement</option>
                        <option>Illegal Parking</option>
                        <option>Other</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Date Observed</label>
                    <input type="date" id="repDate" />
                </div>

                <div class="form-group full">
                    <label>Description</label>
                    <textarea id="repDesc" rows="4"
                        placeholder="Describe the issue — what you saw, how severe it is, any hazards…"></textarea>
                </div>

                <div class="form-group full">
                    <label>Upload Photo</label>
                    <div class="upload-area" onclick="document.getElementById('repImage').click()">
                        <i class="fas fa-cloud-arrow-up"></i>
                        <p id="uploadLabel">Click to upload an image</p>
                        <small>PNG, JPG up to 10MB</small>
                    </div>
                    <input type="file" id="repImage" accept="image/*" style="display:none"
                        onchange="handleUpload(this)" />
                    <div id="imagePreview" class="image-preview" style="display:none">
                        <img id="previewImg" src="" alt="Preview" />
                        <button class="remove-img" onclick="removeImage()"><i class="fas fa-times"></i></button>
                    </div>
                </div>

            </div>

            <hr class="form-divider" />
            <div class="form-footer">
                <button class="btn-submit" onclick="submitReport()">
                    <i class="fas fa-paper-plane"></i> Submit Report
                </button>
                <small style="color:var(--tm)">Location and Category are required</small>
            </div>
        </div>
 
    </main>
    <div id="toast"></div>
    <script src="{{ url_for('static', filename='sidebar-template.js') }}"></script>
    <script src="{{ url_for('static', filename='sidebar.js') }}"></script>
    <script src="{{ url_for('static', filename='reports.js') }}"></script>
      <script src="{{ url_for('static', filename='include.js') }}"></script>
</body>

</html>
